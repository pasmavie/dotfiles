"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](color_peach)\
$os\
$username\
[](bg:color_yellow fg:color_peach)\
$directory\
[](fg:color_yellow bg:color_green)\
$git_branch\
$git_status\
[](fg:color_green bg:color_blue)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:color_blue bg:color_surface1)\
$docker_context\
$conda\
$pixi\
[ ](fg:color_surface1)\
$line_break$character"""

palette = 'catppuccin_mocha'

[palettes.catppuccin_mocha]
color_text = '#cdd6f4'
color_surface0 = '#313244'
color_surface1 = '#45475a'
color_blue = '#89b4fa'
color_green = '#a6e3a1'
color_peach = '#fab387'
color_red = '#f38ba8'
color_yellow = '#f9e2af'
color_mauve = '#cba6f7'
color_lavender = '#b4befe'
color_teal = '#94e2d5'

[os]
disabled = false
style = "bg:color_peach fg:color_surface0"

[os.symbols]
Windows = "َ°چ²"
Ubuntu = "َ°•ˆ"
SUSE = ""
Raspbian = "َ°گ؟"
Mint = "َ°£­"
Macos = "َ°€µ"
Manjaro = ""
Linux = "َ°Œ½"
Gentoo = "َ°£¨"
Fedora = "َ°£›"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "َ°£‡"
Artix = "َ°£‡"
EndeavourOS = ""
CentOS = ""
Debian = "َ°£ڑ"
Redhat = "َ±„›"
RedHatEnterprise = "َ±„›"
Pop = ""

[username]
show_always = true
style_user = "bg:color_peach fg:color_surface0"
style_root = "bg:color_peach fg:color_surface0"
format = '[ $user ]($style)'

[directory]
style = "fg:color_surface0 bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "â€¦/"

[directory.substitutions]
"Documents" = "َ°ˆ™ "
"Downloads" = " "
"Music" = "َ°‌ڑ "
"Pictures" = " "
"Developer" = "َ°²‹ "

[git_branch]
symbol = "\ue725"
style = "bg:color_green"
format = '[[ $symbol $branch ](fg:color_surface0 bg:color_green)]($style)'

[git_status]
style = "bg:color_green"
format = '[[($all_status$ahead_behind )](fg:color_surface0 bg:color_green)]($style)'

[nodejs]
symbol = "\ue718"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_surface0 bg:color_blue)]($style)'

[c]
symbol = "\ue61e"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_surface0 bg:color_blue)]($style)'

[cpp]
symbol = "\ue61d"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_surface0 bg:color_blue)]($style)'

[rust]
symbol = "\ue7a8"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_surface0 bg:color_blue)]($style)'

[golang]
symbol = "\ue626"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_surface0 bg:color_blue)]($style)'

[php]
symbol = "\ue73d"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_surface0 bg:color_blue)]($style)'

[java]
symbol = "\ue256"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_surface0 bg:color_blue)]($style)'

[kotlin]
symbol = "\ue634"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_surface0 bg:color_blue)]($style)'

[haskell]
symbol = "\ue777"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_surface0 bg:color_blue)]($style)'

[python]
symbol = "\ue73c"
style = "bg:color_blue"
pyenv_version_name = true
format = '[[ $symbol( $version) ](fg:color_surface0 bg:color_blue)]($style)'

[docker_context]
symbol = "\ue7b0"
style = "bg:color_surface1"
format = '[[ $symbol( $context) ](fg:color_teal bg:color_surface1)]($style)'

[conda]
style = "bg:color_surface1"
format = '[[ $symbol( $environment) ](fg:color_teal bg:color_surface1)]($style)'

[pixi]
style = "bg:color_surface1"
format = '[[ $symbol( $version)( $environment) ](fg:color_text bg:color_surface1)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[](bold fg:color_green)'
error_symbol = '[](bold fg:color_red)'
vimcmd_symbol = '[](bold fg:color_green)'
vimcmd_replace_one_symbol = '[](bold fg:color_mauve)'
vimcmd_replace_symbol = '[](bold fg:color_mauve)'
vimcmd_visual_symbol = '[](bold fg:color_yellow)'
