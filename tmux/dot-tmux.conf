# Plugin manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Powerline-style status bar (provides shape; colors set below after TPM)
set -g @plugin 'jooize/tmux-powerline-theme'
set-environment -g TMUX_POWERLINE_SYMBOLS "powerline"

# Pane borders and message colors (Solarized Dark)
set -g pane-border-style "fg=#586e75"
set -g pane-active-border-style "fg=#93a1a1"
set -g message-style "bg=#073642,fg=#b58900"
set -g message-command-style "bg=#073642,fg=#b58900"

# Window name = basename of cwd (instead of process title)
set -g automatic-rename-format '#{b:pane_current_path}'

# True color support (Ghostty + Neovim)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:Tc"

# Mouse
set -g mouse on

# Vi mode
set -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection

# Retain current path when splitting
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Vim-like pane navigation (prefix + hjkl)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Resize panes
bind J resize-pane -D 10
bind K resize-pane -U 10
bind H resize-pane -L 10
bind L resize-pane -R 10

# Join pane
bind S command-prompt -p "send pane to:" "join-pane -t '%%'"

# Shell
set -g default-command /bin/zsh

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
